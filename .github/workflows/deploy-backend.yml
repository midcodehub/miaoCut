# ============================================================
# MiaoCut 后端自动分发部署到 Hugging Face Spaces
# ============================================================
# 流程：
#   1. main 分支相关文件变更后触发。
#   2. GitHub Actions 将当前提交依次推送到 Docker Spaces：
#      https://huggingface.co/spaces/midcodex/miao_cut
#      https://huggingface.co/spaces/midcodex/miao_cut2
#      https://huggingface.co/spaces/midcodex/miao_cut3
#
# GitHub 仓库 Settings → Secrets and variables → Actions 中需配置：
#   HF_TOKEN：有以上 Space 写权限的 Hugging Face access token。
# ============================================================

name: Deploy Backend

on:
  push:
    branches: [ main ]
    paths:
      - "main.py"
      - "requirements.txt"
      - "Dockerfile"
      - "README.md"
      - "index.html"
      - "output.css"
      - "app.js"
      - "product-photo-background-remover/**"
      - "portrait-background-remover/**"
      - "examples/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    # 允许在 GitHub UI 手动触发，用于强制 redeploy

jobs:
  deploy:
    name: Push to Hugging Face Spaces
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push current commit to Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$HF_TOKEN" ]; then
            echo "HF_TOKEN secret is not configured."
            exit 1
          fi

          spaces=(
            "miao_cut"
            "miao_cut2"
            "miao_cut3"
          )

          for space in "${spaces[@]}"; do
            repo="huggingface.co/spaces/midcodex/${space}"
            echo "==> Pushing to https://${repo}"
            git push "https://midcodex:${HF_TOKEN}@${repo}" HEAD:main --force
          done
