# ============================================================
# MiaoCut 后端自动部署
# ============================================================
# 触发条件：push 到 main 分支且后端文件有变动
# 部署方式：SSH 到 VPS → git pull → docker build → 重启容器
#
# 需要在 GitHub 仓库 Settings → Secrets and variables → Actions 中添加：
#   VPS_HOST     - VPS IP 或域名（如 api.miaocut.com）
#   VPS_USER     - SSH 用户名（如 root）
#   VPS_SSH_KEY  - SSH 私钥（在 VPS 上用 ssh-keygen 生成，把私钥贴这里）
#   VPS_PORT     - SSH 端口（可选，默认 22）
# ============================================================

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 10m
          script_stop: true
          script: |
            set -e

            mkdir -p /opt/miaoCut
            cd /opt/miaoCut

            if [ ! -d ".git" ]; then
              echo "==> Cloning repository..."
              git clone https://github.com/midcodehub/miaoCut.git .
            else
              echo "==> Pulling latest code..."
              git pull origin main
            fi

            echo "==> Building Docker image..."
            docker build -t miaocut-api .

            echo "==> Restarting container..."
            docker stop miaocut 2>/dev/null || true
            docker rm miaocut 2>/dev/null || true

            docker run -d \
              --name miaocut \
              --restart unless-stopped \
              -p 80:8000 \
              -e ALLOWED_ORIGINS=https://miaocut.app,https://www.miaocut.app \
              -e TRUST_PROXY=1 \
              -e MAX_CONCURRENCY=2 \
              -v miaocut-models:/app/.u2net \
              -v miaocut-data:/app/data \
              miaocut-api

            # 健康检查：最多等 120 秒（首次需下载 230MB 模型）
            echo "==> Waiting for server to be ready (up to 120s)..."
            for i in $(seq 1 24); do
              if curl -sf http://127.0.0.1:80/ > /dev/null 2>&1; then
                echo "==> ✅ Deploy SUCCESS! (ready in ~$((i*5))s)"
                docker image prune -f
                exit 0
              fi
              # 检查容器是否还活着
              if ! docker ps -q -f name=miaocut | grep -q .; then
                echo "==> ❌ Container crashed! Logs:"
                docker logs --tail 30 miaocut
                exit 1
              fi
              echo "    waiting... ($((i*5))s)"
              sleep 5
            done

            echo "==> ❌ Server did not respond within 120s. Logs:"
            docker logs --tail 30 miaocut
            exit 1
