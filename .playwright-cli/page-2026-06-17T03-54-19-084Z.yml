          - paragraph [ref=e100]: Pembuat foto MiaoCut ID membantu Anda membuat foto paspor, foto visa, foto satu inci, foto dua inci, foto resume, dan lembar foto yang dapat dicetak. Pilih ukuran preset, sesuaikan penempatan potret, ganti warna latar belakang, dan unduh output standar dan resolusi tinggi.
