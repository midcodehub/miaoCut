            - generic [ref=e108]:
              - heading "Cetak lembaran" [level=3] [ref=e109]
              - paragraph [ref=e110]: Hasilkan tata letak 5 inci, 6 inci, 7 inci, atau A4 yang dapat dicetak.
    - generic [ref=e111]:
      - heading "Pertanyaan yang Sering Diajukan" [level=2] [ref=e112]
      - generic [ref=e113]:
        - generic [ref=e114]:
          - heading "Berapa ukuran foto ID yang didukung MiaoCut?" [level=3] [ref=e115]
          - paragraph [ref=e116]: China 1 inci (295×413), 2 inci (413×579), varian kecil/besar 1 inci dan 2 inci, paspor Tiongkok (390×567), paspor AS (600×600), visa Schengen (600×600), foto resume (480×640), profil sosial (512×512), ditambah ukuran piksel khusus apa pun.
        - generic [ref=e117]:
          - heading "Warna latar belakang apa yang didukung?" [level=3] [ref=e118]
          - paragraph [ref=e119]: Putih, biru, merah, abu-abu, biru muda, biru tua, merah muda, hitam, dan warna HEX khusus apa pun.
        - generic [ref=e120]:
          - heading "Bisakah saya mencetak beberapa foto ID dalam satu lembar?" [level=3] [ref=e121]
          - paragraph [ref=e122]: Ya. Pilih kertas 5 inci, 6 inci, 7 inci, atau A4 untuk menghasilkan lembar tata letak yang dapat dicetak dengan banyak salinan yang disusun untuk dipotong.
        - generic [ref=e123]:
          - heading "Apakah foto saya akan memenuhi persyaratan dokumen resmi?" [level=3] [ref=e124]
          - paragraph [ref=e125]: MiaoCut menghasilkan foto berukuran tepat dengan latar belakang netral, namun selalu periksa dokumen spesifik Anda atau persyaratan terbaru kantor visa (ukuran kepala, ekspresi, aturan kacamata, format file) sebelum mengirimkannya.
        - generic [ref=e126]:
          - heading "Apakah MiaoCut mendeteksi wajah saya secara otomatis?" [level=3] [ref=e127]
          - paragraph [ref=e128]: Ya. MediaPipe Face Mesh mendeteksi garis mata dan posisi kepala Anda, lalu foto dipotong secara otomatis dan disejajarkan agar sesuai dengan ukuran preset yang dipilih. Anda dapat menyempurnakan ukuran subjek dan margin atas dengan penggeser.
        - generic [ref=e129]:
          - heading "Apakah foto saya pribadi?" [level=3] [ref=e130]
          - paragraph [ref=e131]: Foto diproses dalam memori di server dan segera dibuang setelah hasilnya dikembalikan. Kami tidak menyimpan gambar Anda, tidak menggunakannya untuk pelatihan AI, dan tidak perlu mendaftar.
        - generic [ref=e132]:
          - heading "Bisakah saya mengatur ukuran file maksimal di KB untuk formulir online?" [level=3] [ref=e133]
          - paragraph [ref=e134]: Ya. Masukan "Target KB" memungkinkan Anda membatasi ukuran file keluaran — berguna untuk formulir lamaran visa atau pekerjaan dengan batasan ukuran file yang ketat.
    - generic [ref=e135]:
      - heading "Cara Membuat Foto Paspor atau ID" [level=2] [ref=e136]
      - generic [ref=e137]:
        - generic [ref=e138]:
          - generic [ref=e139]: 📤
          - heading "1. Unggah potret Anda" [level=3] [ref=e140]
          - paragraph [ref=e141]: Unggah potret menghadap ke depan dalam format JPG, PNG, atau WebP. Bahkan pencahayaan netral bekerja paling baik.
        - generic [ref=e142]:
          - generic [ref=e143]: ⚙️
          - heading "2. Pilih ukuran dan latar belakang" [level=3] [ref=e144]
          - paragraph [ref=e145]: Pilih preset negara (atau masukkan dimensi khusus), pilih warna latar belakang, dan sesuaikan ukuran subjek atau margin atas jika diperlukan.
        - generic [ref=e146]:
          - generic [ref=e147]: 🖼️
          - heading "3. Hasilkan, sesuaikan KB, unduh" [level=3] [ref=e148]
          - paragraph [ref=e149]: MiaoCut mendeteksi wajah Anda secara otomatis dan menghasilkan foto standar, versi transparan HD, dan tata letak yang dapat dicetak. Tetapkan Target KB jika formulir Anda memerlukan ukuran file tertentu.
