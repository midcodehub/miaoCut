<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiaoCut - 1秒纯净抠图</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for dropzone */
        #dropzone {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 flex flex-col selection:bg-gray-200">

    <!-- 顶部导航 -->
    <header class="w-full flex items-center justify-between px-8 py-6">
        <div class="text-2xl font-black tracking-tight text-gray-900">
            MiaoCut
        </div>
        <a href="#" class="text-gray-400 hover:text-gray-900 transition-colors" title="GitHub">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
            </svg>
        </a>
    </header>

    <!-- 核心区域 -->
    <main class="flex-grow flex flex-col items-center justify-center px-4 -mt-16">
        
        <!-- 标语 -->
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-4">1秒纯净抠图</h1>
            <p class="text-lg text-gray-500">不谈排版，只给白底。</p>
        </div>

        <!-- Dropzone -->
        <div class="w-full max-w-3xl">
            <div id="dropzone" class="relative group cursor-pointer bg-white border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center min-h-[320px] hover:border-gray-400 hover:bg-gray-50 overflow-hidden">
                <input type="file" id="fileInput" class="hidden" accept="image/jpeg, image/png, image/webp">
                
                <div id="dropzone-content" class="flex flex-col items-center justify-center text-center p-8 pointer-events-none">
                    <svg class="w-12 h-12 text-gray-400 mb-4 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    <p class="text-lg font-medium text-gray-700 mb-1">将图片拖拽至此，或点击上传</p>
                    <p class="text-sm text-gray-400">（支持 JPG / PNG / WebP）</p>
                </div>
            </div>

            <!-- 信任背书 -->
            <div class="mt-6 flex flex-col items-center justify-center text-center text-gray-500 text-sm">
                <div class="flex items-center gap-1.5 mb-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <span class="font-medium">你的图片绝对安全。</span>
                </div>
                <p>纯内存处理，15分钟后自动销毁，绝不用于 AI 训练。</p>
            </div>
        </div>

    </main>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const dropzoneContent = document.getElementById('dropzone-content');

        // 保存原始的 HTML 内容，以便恢复
        const originalContentHTML = dropzoneContent.innerHTML;

        // 阻止默认拖拽行为
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 拖入时高亮效果
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.add('border-gray-600', 'bg-gray-100');
                dropzone.classList.remove('border-gray-300', 'bg-white', 'hover:border-gray-400', 'hover:bg-gray-50');
            }, false);
        });

        // 拖出时恢复效果
        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.remove('border-gray-600', 'bg-gray-100');
                dropzone.classList.add('border-gray-300', 'bg-white', 'hover:border-gray-400', 'hover:bg-gray-50');
            }, false);
        });

        // 点击触发文件选择
        dropzone.addEventListener('click', () => {
            // 如果正在 loading，则不响应点击
            if (dropzone.classList.contains('pointer-events-none')) return;
            fileInput.click();
        });

        // 文件选择处理
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                handleFiles(this.files);
            }
        });

        // 拖拽释放处理
        dropzone.addEventListener('drop', function(e) {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        });

        async function handleFiles(files) {
            const file = files[0];
            
            // 简单校验文件类型
            if (!file.type.match('image.*')) {
                alert('请上传图片文件');
                return;
            }

            console.log(`[MiaoCut] 开始处理图片: ${file.name}`);

            // 1. 模拟 Loading 状态
            // 锁定 Dropzone，避免重复点击
            dropzone.classList.add('pointer-events-none');
            
            // 替换 Dropzone 内部 HTML 为 Loading 状态
            dropzoneContent.innerHTML = `
                <svg class="animate-spin w-10 h-10 text-gray-800 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-lg font-medium text-gray-700 animate-pulse">AI 正在精细处理边缘...</p>
            `;

            // 2. 发起真实的后端请求
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/remove-background', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || '网络请求失败');
                }

                // 3. 获取返回的图片流
                const blob = await response.blob();
                const resultUrl = URL.createObjectURL(blob);
                
                // 4. 极简设计：直接触发本地下载
                const a = document.createElement('a');
                a.href = resultUrl;
                const originalName = file.name.split('.')[0];
                a.download = `${originalName}_nobg.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // 5. 更新界面为成功状态 (2秒后恢复原样)
                dropzoneContent.innerHTML = `
                    <svg class="w-12 h-12 text-green-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-lg font-medium text-gray-800 mb-1">处理成功！</p>
                    <p class="text-sm text-gray-500">正在为您自动下载...</p>
                `;

            } catch (error) {
                console.error("API Error:", error);
                dropzoneContent.innerHTML = `
                    <svg class="w-12 h-12 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-lg font-medium text-gray-800 mb-1">抱歉，处理失败</p>
                    <p class="text-sm text-gray-500 max-w-xs px-4 truncate">${error.message}</p>
                `;
            } finally {
                // 不管成功失败，2 秒后恢复初始上传状态
                setTimeout(() => {
                    dropzoneContent.innerHTML = originalContentHTML;
                    dropzone.classList.remove('pointer-events-none');
                    fileInput.value = '';
                }, 2000);
            }
        }
    </script>
</body>
</html>
