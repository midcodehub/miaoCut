<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiaoCut - 1秒纯净抠图</title>
    <meta name="description" content="MiaoCut - 免费在线抠图工具，AI 驱动，1秒去除背景，隐私安全，无需注册。">
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!--
      Umami Analytics - 隐私友好的流量统计
      设置步骤：
      1. 访问 https://cloud.umami.is 注册免费账号
      2. 添加你的网站，获取 data-website-id
      3. 把下面的 YOUR_WEBSITE_ID 替换成你的真实 ID
      4. 如果自部署 Umami，把 src 也换成你自己的地址
    -->
    <script defer src="https://cloud.umami.is/script.js" data-website-id="a3674746-2fc8-4b54-8fe8-3e01e4c0028a"></script>
    <style>
        #dropzone { transition: all 0.2s ease-in-out; }
        #bookmark-banner {
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #bookmark-banner.show { transform: translateY(0); }
        #feedback-panel {
            transform: scale(0.9) translateY(10px);
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #feedback-panel.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800 flex flex-col selection:bg-gray-200">

    <!-- 顶部导航 -->
    <header class="w-full flex items-center justify-between px-8 py-6">
        <div class="text-2xl font-black tracking-tight text-gray-900">
            MiaoCut
        </div>
        <a href="#" class="text-gray-400 hover:text-gray-900 transition-colors" title="GitHub">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
            </svg>
        </a>
    </header>

    <!-- 核心区域 -->
    <main class="flex-grow flex flex-col items-center justify-center px-4 -mt-16">
        
        <!-- 标语 -->
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-4">1秒纯净抠图</h1>
            <p class="text-lg text-gray-500">不谈排版，只给白底。</p>
        </div>

        <!-- Dropzone -->
        <div class="w-full max-w-3xl">
            <div id="dropzone" class="relative group cursor-pointer bg-white border-2 border-dashed border-gray-300 rounded-2xl flex flex-col items-center justify-center min-h-[320px] hover:border-gray-400 hover:bg-gray-50 overflow-hidden">
                <input type="file" id="fileInput" class="hidden" accept="image/jpeg, image/png, image/webp">
                
                <div id="dropzone-content" class="flex flex-col items-center justify-center text-center p-8 pointer-events-none">
                    <svg class="w-12 h-12 text-gray-400 mb-4 group-hover:text-gray-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    <p class="text-lg font-medium text-gray-700 mb-1">将图片拖拽至此，或点击上传</p>
                    <p class="text-sm text-gray-400">（支持 JPG / PNG / WebP）</p>
                </div>
            </div>

            <!-- 信任背书 -->
            <div class="mt-6 flex flex-col items-center justify-center text-center text-gray-500 text-sm">
                <div class="flex items-center gap-1.5 mb-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                    <span class="font-medium">你的图片绝对安全。</span>
                </div>
                <p>纯内存处理，15分钟后自动销毁，绝不用于 AI 训练。</p>
            </div>
        </div>

    </main>

    <!-- Bookmark Banner -->
    <div id="bookmark-banner" class="fixed top-0 left-0 right-0 z-50 bg-gray-900 text-white">
        <div class="max-w-3xl mx-auto flex items-center justify-between px-6 py-3">
            <div class="flex items-center gap-3">
                <span class="text-lg">&#11088;</span>
                <p class="text-sm">&#21916;&#27426; MiaoCut &#21527;&#65311;&#25353; <kbd id="shortcut-key" class="px-1.5 py-0.5 bg-gray-700 rounded text-xs font-mono">Ctrl + D</kbd> &#21152;&#20837;&#20070;&#31614;&#65292;&#19979;&#27425;&#25248;&#22270;&#21482;&#38656; 1 &#31186;&#65281;</p>
            </div>
            <button id="dismiss-banner" class="text-gray-400 hover:text-white transition-colors ml-4 shrink-0" aria-label="close">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
    </div>

    <!-- Feedback Widget -->
    <div id="feedback-widget" class="fixed bottom-6 right-6 z-40">
        <div id="feedback-panel" class="absolute bottom-14 right-0 w-72 bg-white rounded-xl shadow-2xl border border-gray-100 p-5">
            <h3 class="text-sm font-semibold text-gray-900 mb-3">&#9749; &#25552;&#28857;&#24314;&#35758;</h3>
            <form id="feedback-form">
                <textarea id="feedback-msg" class="w-full h-20 text-sm border border-gray-200 rounded-lg p-2.5 resize-none focus:outline-none focus:ring-2 focus:ring-gray-300 placeholder-gray-400" placeholder="&#26377;&#20160;&#20040;&#24819;&#27861;&#65311;"></textarea>
                <input id="feedback-email" type="email" class="w-full mt-2 text-sm border border-gray-200 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-gray-300 placeholder-gray-400" placeholder="&#37038;&#31665;&#65288;&#36873;&#22635;&#65292;&#26041;&#20415;&#25105;&#20204;&#22238;&#22797;&#20320;&#65289;">
                <button type="submit" class="w-full mt-3 bg-gray-900 text-white text-sm font-medium py-2 rounded-lg hover:bg-gray-800 transition-colors">&#21457;&#36865;</button>
            </form>
            <div id="feedback-thanks" class="hidden text-center py-6">
                <p class="text-2xl mb-2">&#127881;</p>
                <p class="text-sm font-medium text-gray-800">&#24863;&#35874;&#20320;&#30340;&#24314;&#35758;&#65281;</p>
                <p class="text-xs text-gray-500 mt-1">&#25105;&#20204;&#20250;&#35748;&#30495;&#23545;&#24453;&#27599;&#19968;&#26465;&#21453;&#39304;</p>
            </div>
        </div>
        <button id="feedback-trigger" class="w-11 h-11 bg-white border border-gray-200 rounded-full shadow-lg flex items-center justify-center hover:shadow-xl hover:scale-110 transition-all text-lg" title="feedback">&#9749;</button>
    </div>

    <script>
        // ============================================================
        // API 配置
        // ============================================================
        // 后端 API 地址（VPS）
        const API_BASE = 'https://api.miaocut.app';

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const dropzoneContent = document.getElementById('dropzone-content');

        // 保存原始的 HTML 内容，以便恢复
        const originalContentHTML = dropzoneContent.innerHTML;

        // 阻止默认拖拽行为
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // 拖入时高亮效果
        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.add('border-gray-600', 'bg-gray-100');
                dropzone.classList.remove('border-gray-300', 'bg-white', 'hover:border-gray-400', 'hover:bg-gray-50');
            }, false);
        });

        // 拖出时恢复效果
        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => {
                dropzone.classList.remove('border-gray-600', 'bg-gray-100');
                dropzone.classList.add('border-gray-300', 'bg-white', 'hover:border-gray-400', 'hover:bg-gray-50');
            }, false);
        });

        // 点击触发文件选择
        dropzone.addEventListener('click', () => {
            // 如果正在 loading，则不响应点击
            if (dropzone.classList.contains('pointer-events-none')) return;
            fileInput.click();
        });

        // 文件选择处理
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                handleFiles(this.files);
            }
        });

        // 拖拽释放处理
        dropzone.addEventListener('drop', function(e) {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        });

        // 与后端一致的白名单；后端 MAX_UPLOAD_MB 默认 10，这里保持同步
        const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
        const MAX_UPLOAD_BYTES = 10 * 1024 * 1024;

        // 前端智能压缩：保留细节的前提下减小体积
        // maxWidth=2560 保证细线条（如登山杖）不被缩没
        // quality=0.95 保证边缘信息不被压缩损坏
        async function compressImage(file, maxWidth = 2560) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    let width = img.width;
                    let height = img.height;
                    
                    // 等比例缩放，限制最大宽度
                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 质量 0.95：在体积与细节之间取最优平衡
                    canvas.toBlob((blob) => {
                        resolve(new File([blob], file.name.split('.')[0] + '.webp', { type: 'image/webp' }));
                    }, 'image/webp', 0.95); 
                };
            });
        }

        async function handleFiles(files) {
            const file = files[0];

            // 类型白名单
            if (!ALLOWED_TYPES.includes(file.type)) {
                alert('仅支持 JPG / PNG / WebP 格式的图片');
                return;
            }

            console.log(`[MiaoCut] 原始图片: ${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`);

            // 1. 模拟 Loading 状态
            dropzone.classList.add('pointer-events-none');
            dropzoneContent.innerHTML = `
                <svg class="animate-spin w-10 h-10 text-gray-800 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-lg font-medium text-gray-700 animate-pulse">正在压缩与处理中...</p>
            `;

            // 2. 前端极速压缩 (超过 500KB 才压缩，避免小图被过度处理)
            let uploadFile = file;
            if (file.size > 500 * 1024) {
                uploadFile = await compressImage(file);
                console.log(`[MiaoCut] 压缩后: ${uploadFile.name} (${(uploadFile.size/1024).toFixed(2)} KB)`);
            }

            // 3. 发起真实的后端请求
            const formData = new FormData();
            formData.append('file', uploadFile);

            try {
                const response = await fetch(API_BASE + '/api/remove-background', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    // 后端统一返回 JSON { detail: "..." }，尽量提取 detail 字段；失败则退回原文
                    let message = `请求失败（${response.status}）`;
                    try {
                        const data = await response.json();
                        if (data && typeof data.detail === 'string') message = data.detail;
                    } catch (_) {
                        try { message = (await response.text()) || message; } catch (_) {}
                    }
                    throw new Error(message);
                }

                // 3. 获取返回的图片流
                const blob = await response.blob();
                const resultUrl = URL.createObjectURL(blob);
                
                // 4. 极简设计：直接触发本地下载
                const a = document.createElement('a');
                a.href = resultUrl;
                const originalName = file.name.split('.')[0];
                a.download = `${originalName}_nobg.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // 5. 更新界面为成功状态 (2秒后恢复原样)
                dropzoneContent.innerHTML = `
                    <svg class="w-12 h-12 text-green-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-lg font-medium text-gray-800 mb-1">处理成功！</p>
                    <p class="text-sm text-gray-500">正在为您自动下载...</p>
                `;

                // 6. 首次成功后弹出书签提示
                showBookmarkBanner();

            } catch (error) {
                console.error("API Error:", error);
                // 用 DOM 拼装而不是 innerHTML 拼字符串，防止 error.message 里若含 HTML 被当标签执行（XSS）
                dropzoneContent.innerHTML = '';
                const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                icon.setAttribute('class', 'w-12 h-12 text-red-500 mb-4');
                icon.setAttribute('fill', 'none');
                icon.setAttribute('stroke', 'currentColor');
                icon.setAttribute('viewBox', '0 0 24 24');
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>';
                const title = document.createElement('p');
                title.className = 'text-lg font-medium text-gray-800 mb-1';
                title.textContent = '抱歉，处理失败';
                const detail = document.createElement('p');
                detail.className = 'text-sm text-gray-500 max-w-xs px-4 truncate';
                detail.textContent = error.message; // textContent 自动转义
                dropzoneContent.append(icon, title, detail);
            } finally {
                // 不管成功失败，2 秒后恢复初始上传状态
                setTimeout(() => {
                    dropzoneContent.innerHTML = originalContentHTML;
                    dropzone.classList.remove('pointer-events-none');
                    fileInput.value = '';
                }, 2000);
            }
        }

        // ========== Bookmark Banner ==========
        let bannerShown = false;
        function showBookmarkBanner() {
            if (bannerShown) return;
            bannerShown = true;
            const isMac = navigator.platform.toUpperCase().includes('MAC')
                       || navigator.userAgent.toUpperCase().includes('MAC');
            document.getElementById('shortcut-key').textContent = isMac ? '\u2318 + D' : 'Ctrl + D';
            const banner = document.getElementById('bookmark-banner');
            setTimeout(() => banner.classList.add('show'), 1000);
            setTimeout(() => banner.classList.remove('show'), 9000);
        }
        document.getElementById('dismiss-banner').addEventListener('click', () => {
            document.getElementById('bookmark-banner').classList.remove('show');
        });

        // ========== Feedback Widget ==========
        const feedbackTrigger = document.getElementById('feedback-trigger');
        const feedbackPanel = document.getElementById('feedback-panel');
        const feedbackForm = document.getElementById('feedback-form');
        const feedbackThanks = document.getElementById('feedback-thanks');

        feedbackTrigger.addEventListener('click', () => {
            feedbackPanel.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!document.getElementById('feedback-widget').contains(e.target)) {
                feedbackPanel.classList.remove('open');
            }
        });
        feedbackForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const msg = document.getElementById('feedback-msg').value.trim();
            if (!msg) return;
            const email = document.getElementById('feedback-email').value.trim();

            // POST to backend
            try {
                await fetch(API_BASE + '/api/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, email: email || undefined })
                });
            } catch (err) {
                console.warn('[MiaoCut] Feedback send failed:', err);
            }

            // Umami custom event tracking
            if (typeof umami !== 'undefined') {
                umami.track('feedback-submitted');
            }

            feedbackForm.classList.add('hidden');
            feedbackThanks.classList.remove('hidden');
            setTimeout(() => {
                feedbackPanel.classList.remove('open');
                setTimeout(() => {
                    feedbackForm.classList.remove('hidden');
                    feedbackThanks.classList.add('hidden');
                    feedbackForm.reset();
                }, 300);
            }, 2000);
        });
    </script>
</body>
</html>
