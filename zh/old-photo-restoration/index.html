    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MiaoCut Old Photo Restoration",
      "url": "https://miaocut.app/zh/old-photo-restoration/",

<body class="bg-gray-50 min-h-screen font-sans text-gray-900 selection:bg-gray-200">
    <header class="relative z-10 w-full bg-white border-b border-gray-200">
        <div class="mx-auto max-w-6xl px-5 py-4 flex items-center justify-between gap-4">
            <a href="/zh/" class="text-2xl font-black tracking-tight text-gray-900">MiaoCut</a>
            <div class="flex items-center gap-4">
                <nav class="hidden md:flex items-center gap-4 text-sm font-medium text-gray-600">
                    <a href="/zh/" class="hover:text-gray-900 transition-colors" data-i18n="navBg">AI 抠图</a>
                    <a href="/zh/product-photo-background-remover/" class="hover:text-gray-900 transition-colors" data-i18n="navProduct">商品图</a>
                    <a href="/zh/portrait-background-remover/" class="hover:text-gray-900 transition-colors" data-i18n="navPortrait">人像</a>
                    <a href="/zh/watermark-remover/" class="hover:text-gray-900 transition-colors" data-i18n="navWatermark">去水印</a>
                    <a href="/zh/id-photo-maker/" class="hover:text-gray-900 transition-colors" data-i18n="navId">证件照</a>
                    <a href="/zh/old-photo-restoration/" class="text-gray-900" data-i18n="navRestore">老照片修复</a>
                </nav>
                <select id="lang-switch" aria-label="Language"
                    class="bg-transparent text-sm font-medium text-gray-600 outline-none cursor-pointer hover:text-gray-900 transition-colors">
                    <option value="en">English</option>
                    <option value="zh">简体中文</option>
                </select>
            </div>
        </div>
    </header>
    <nav class="md:hidden flex gap-3 overflow-x-auto border-b border-gray-200 bg-white px-5 py-3 text-sm font-medium text-gray-600">
        <a href="/zh/" class="shrink-0" data-i18n="navBg">AI 抠图</a>
        <a href="/zh/product-photo-background-remover/" class="shrink-0" data-i18n="navProduct">商品图</a>
        <a href="/zh/portrait-background-remover/" class="shrink-0" data-i18n="navPortrait">人像</a>
        <a href="/zh/watermark-remover/" class="shrink-0" data-i18n="navWatermark">去水印</a>
        <a href="/zh/id-photo-maker/" class="shrink-0" data-i18n="navId">证件照</a>
        <a href="/zh/old-photo-restoration/" class="shrink-0 text-gray-900" data-i18n="navRestore">老照片修复</a>
    </nav>

    <main class="mx-auto max-w-6xl px-5 py-8">
        <section class="mb-7 flex flex-col gap-2">
            <p class="text-sm font-semibold text-gray-500" data-i18n="eyebrow">老照片、家庭相册、扫描照片</p>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight" data-i18n="heroTitle">老照片修复高清</h1>
            <p class="max-w-3xl text-sm md:text-base text-gray-500 leading-relaxed" data-i18n="heroSub">修复褪色对比度、降低噪点、增强模糊细节，并导出更清晰的高分辨率照片。</p>
        </section>

        <section class="grid grid-cols-1 lg:grid-cols-[380px_1fr] gap-6 items-start">
            <aside class="bg-white border border-gray-200 rounded-lg p-5">
                <label id="upload-card"
                    class="flex min-h-[250px] cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-gray-300 bg-gray-50 px-4 py-6 text-center hover:border-gray-400 hover:bg-white transition-colors">
                    <svg id="upload-icon" class="mb-3 h-10 w-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    <img id="upload-preview" alt="Selected photo preview" class="mb-3 hidden max-h-56 w-full rounded border border-gray-200 bg-white object-contain">
                    <span id="file-name" class="text-sm font-medium text-gray-700" data-i18n="uploadText">点击上传 JPG、PNG 或 WebP</span>
                    <span id="upload-hint" class="mt-1 text-xs text-gray-400" data-i18n="uploadHint">扫描件和手机翻拍照片都可以</span>
                    <input id="restore-file" type="file" class="hidden" accept="image/jpeg,image/png,image/webp">
                </label>

                <div class="mt-5 space-y-4">
                    <div>
                        <label class="mb-1 block text-sm font-semibold text-gray-700" for="restore-strength" data-i18n="strengthLabel">修复强度</label>
                        <select id="restore-strength"
                            class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
                            <option value="gentle" data-i18n="strengthGentle">轻柔</option>
                            <option value="balanced" selected data-i18n="strengthBalanced">均衡</option>
                            <option value="strong" data-i18n="strengthStrong">强力</option>
                        </select>
                    </div>
                    <div>
                        <label class="mb-1 block text-sm font-semibold text-gray-700" for="restore-scale" data-i18n="scaleLabel">输出倍率</label>
                        <select id="restore-scale"
                            class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-300">
                            <option value="1">1x</option>
                            <option value="2" selected>2x</option>
                            <option value="4">4x</option>
                        </select>
                    </div>
                    <button id="restore-btn"
                        class="w-full rounded-lg bg-gray-900 px-4 py-3 text-sm font-semibold text-white hover:bg-gray-800 disabled:cursor-not-allowed disabled:bg-gray-300 transition-colors"
                        data-i18n="restoreBtn">修复照片</button>
                    <p id="status" class="min-h-[20px] text-sm text-gray-500"></p>
                </div>
            </aside>

            <section class="bg-white border border-gray-200 rounded-lg p-5 min-h-[520px]">
                <div class="mb-4 flex items-center justify-between gap-3">
                    <div>
                        <h2 class="text-lg font-bold" data-i18n="previewTitle">预览</h2>
                        <p class="text-sm text-gray-500" data-i18n="previewSub">对比原图和修复后的高清结果。</p>
                    </div>
                    <button id="download-btn"
                        class="hidden rounded-lg border border-gray-200 px-3 py-2 text-sm font-semibold text-gray-700 hover:border-gray-400 hover:text-gray-900 transition-colors"
                        data-i18n="downloadBtn">下载</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <figure class="min-h-[360px] rounded-lg border border-gray-200 bg-gray-50 p-3">
                        <figcaption class="mb-2 text-xs font-semibold uppercase tracking-wide text-gray-400" data-i18n="beforeLabel">修复前</figcaption>
                        <div class="flex min-h-[310px] items-center justify-center">
                            <img id="before-img" alt="Original photo preview" class="hidden max-h-[430px] max-w-full object-contain">
                            <p id="before-empty" class="text-sm text-gray-400" data-i18n="beforeEmpty">原图会显示在这里</p>
                        </div>
                    </figure>
                    <figure class="min-h-[360px] rounded-lg border border-gray-200 bg-gray-50 p-3">
                        <figcaption class="mb-2 text-xs font-semibold uppercase tracking-wide text-gray-400" data-i18n="afterLabel">修复后</figcaption>
                        <div class="flex min-h-[310px] items-center justify-center">
                            <img id="after-img" alt="Restored photo preview" class="hidden max-h-[430px] max-w-full object-contain">
                            <p id="after-empty" class="text-sm text-gray-400" data-i18n="afterEmpty">修复结果会显示在这里</p>
                        </div>
                    </figure>
                </div>
            </section>
        </section>

        <section class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-4 text-sm text-gray-600">
            <div class="rounded-lg border border-gray-200 bg-white p-5">
                <h3 class="mb-2 font-bold text-gray-900" data-i18n="flow1">恢复质感</h3>
                <p data-i18n="flow1Body">降低扫描噪点，让褪色照片重新拉开明暗层次。</p>
            </div>
            <div class="rounded-lg border border-gray-200 bg-white p-5">
                <h3 class="mb-2 font-bold text-gray-900" data-i18n="flow2">增强细节</h3>
                <p data-i18n="flow2Body">锐化柔软边缘，让旧照片更适合大屏查看和保存。</p>
            </div>
            <div class="rounded-lg border border-gray-200 bg-white p-5">
                <h3 class="mb-2 font-bold text-gray-900" data-i18n="flow3">保护隐私</h3>
                <p data-i18n="flow3Body">沿用 MiaoCut 的纯内存处理策略，照片不会用于训练。</p>
            </div>
        </section>
    </main>

    <script src="/old-photo-restoration/old-photo.js"></script>
    <script src="/feedback.js"></script>
</body>

</html>
